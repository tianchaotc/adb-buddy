name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          key: "windows-msvc-${{ runner.os }}"

      - name: Install frontend dependencies
        shell: pwsh
        run: npm ci

      - name: Run typecheck
        shell: pwsh
        run: npm run typecheck

      - name: Run frontend tests
        shell: pwsh
        run: npm test

      - name: Run Rust tests
        shell: pwsh
        run: |
          cd src-tauri
          cargo test --verbose

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "ADB Buddy ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install. Windows SmartScreen will warn because the installer is not code-signed in MVP — click More info → Run anyway."
          releaseDraft: true
          prerelease: false

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: adb-buddy-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: adb-buddy-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
